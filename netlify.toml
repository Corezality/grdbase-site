# ─────────────────────────────────────────────
# Grdbase — netlify.toml
# Corezality PTY Ltd
# ─────────────────────────────────────────────

[build]
  publish = "."

# ── Redirects ──────────────────────────────
[[redirects]]
  from = "http://grdbase.co.za/*"
  to   = "https://grdbase.co.za/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.grdbase.co.za/*"
  to   = "https://grdbase.co.za/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.grdbase.co.za/*"
  to   = "https://grdbase.co.za/:splat"
  status = 301
  force  = true

# ── Security headers ───────────────────────
[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://sandbox.payfast.co.za https://www.payfast.co.za;"

# ── Cache static assets ────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML never cached ──────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

