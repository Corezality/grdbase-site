# ─────────────────────────────────────────────
# Stackd — netlify.toml
# Corezality PTY Ltd
# ─────────────────────────────────────────────

[build]
  publish = "."

# ── Redirects ──────────────────────────────
[[redirects]]
  from = "http://stackd.co.za/*"
  to   = "https://stackd.co.za/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.stackd.co.za/*"
  to   = "https://stackd.co.za/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.stackd.co.za/*"
  to   = "https://stackd.co.za/:splat"
  status = 301
  force  = true

# ── Security headers (applied to all routes) ──
[[headers]]
  for = "/*"

  [headers.values]

    # Prevent clickjacking — no iframes from other origins
    X-Frame-Options = "DENY"

    # Stop MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Force HTTPS for 1 year, include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Referrer: only send origin on cross-origin requests
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable browser features that aren't needed
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"

    # Content Security Policy
    # - default: only same origin
    # - scripts: self + Google Fonts
    # - styles:  self + Google Fonts
    # - fonts:   Google Fonts CDN
    # - connect: self + your webhook (update WEBHOOK_DOMAIN below)
    # - images:  self + data URIs
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self' https://hooks.zapier.com https://*.netlify.app;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    """

# ── Cache static assets aggressively ──────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML: no cache (always fresh) ─────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

