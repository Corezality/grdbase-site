<!DOCTYPE html>
<html lang="en" style="width:1080px;height:1080px">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
.canvas{padding:56px 64px}
.content{justify-content:flex-start;padding-top:8px}
.pricing-grid{margin-top:32px}
.price-card{min-height:300px;padding:28px 24px}
.tier-price{font-size:44px}
.tier-name{font-size:22px}
</style>
</head>
<body>
<div class="canvas">
  <div class="glow"></div>
  <div class="top" style="margin-bottom:24px">
    <div class="logo">gr<span>d</span>base</div>
    <div class="badge"><span class="badge-dot"></span> Clear pricing</div>
  </div>
  <div class="content" style="flex:0">
    <h2 class="pricing-title">Clear pricing. <em>Clear deliverables.</em></h2>
    <p class="sub" style="margin-top:12px;font-size:24px">Live in as little as 5–14 business days.</p>
  </div>
  <div class="pricing-grid">
    <div class="price-card">
      <div class="tier-label">Tier 01</div>
      <div class="tier-name">Brochure</div>
      <div class="tier-price">R4,500</div>
    </div>
    <div class="price-card featured">
      <div class="tier-label">Tier 02 · Popular</div>
      <div class="tier-name">Commerce</div>
      <div class="tier-price">R9,500</div>
    </div>
    <div class="price-card">
      <div class="tier-label">Tier 03</div>
      <div class="tier-name">Full Stack</div>
      <div class="tier-price">R16,500</div>
    </div>
  </div>
  <div class="footer">
    <span class="url">grdbase.co.za</span>
    <span class="cta">Start your project</span>
  </div>
</div>
</body>
</html>
